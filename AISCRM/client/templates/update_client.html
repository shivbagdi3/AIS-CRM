{% extends 'base.html' %}
{% block content %}

{% load static %}

<section>
        <div class="container mt-5">
                <form class="col-8 mx-auto card p-3 shadow-lg" method="post"
                        action="{% url 'update-client' client.id %}" id="myForm">
                        {% csrf_token %}

                        {% if msg is not None %}
                        <div id="danger-alert" class="alert alert-danger alert-dismissible fade show" role="alert">
                                <button type="button" class="btn-close" data-bs-dismiss="alert"
                                        aria-label="Close"></button>
                                <svg class="bi flex-shrink-0 me-2" width="24" height="24" role="img"
                                        aria-label="Danger:">
                                        <use xlink:href="#exclamation-triangle-fill" />
                                </svg>
                                <div>
                                        {{ msg }}
                                </div>
                        </div>
                        {% endif %}

                        <h2 class="text-primary fw-bold ms-2"> update client</h2>

                        <br>
                        <div class="row">
                                <div class="col-md-6 mb-4">

                                        <div class="form-outline">
                                                <input type="text" id="firstName" name="first_name"
                                                        value="{{ client.first_name }}"
                                                        class="form-control form-control-lg" />
                                                <label class="form-label" for="firstName">First Name</label>
                                        </div>

                                </div>
                                <div class="col-md-6 mb-4">

                                        <div class="form-outline">
                                                <input type="text" id="lastName" name="last_name"
                                                        value="{{ client.last_name }}"
                                                        class="form-control form-control-lg" />
                                                <label class="form-label" for="lastName">Last Name</label>
                                        </div>

                                </div>
                        </div>

                        <div class="row">
                                <div class="col-md-6 mb-4 pb-2">

                                        <div class="form-outline">
                                                <input type="email" id="emailAddress" name="email"
                                                        value="{{ client.email }}"
                                                        class="form-control form-control-lg" />
                                                <label class="form-label" for="emailAddress">Email</label>
                                        </div>

                                </div>
                                <div class="col-md-6 mb-4 pb-2">

                                        <div class="form-outline">
                                                <input type="tel" id="phoneNumber" name="phone_num"
                                                        value="{{ client.phone }}"
                                                        class="form-control form-control-lg" />
                                                <label class="form-label" for="phoneNumber">Phone Number</label>
                                        </div>

                                </div>
                        </div>

                        <div class="row">
                                <div class="col-md-6 mb-4 d-flex align-items-center">

                                        <div class="form-outline w-100">
                                                <input type="tel" name="alternate_no"
                                                        class="form-control form-control-lg"
                                                        value="{{ client.Alternate_no }}" id="birthdayDate" />
                                                <label for="birthdayDate" class="form-label">Alternative No</label>
                                        </div>

                                </div>
                                <div class="col-md-6 mb-4">

                                        <div class="form-outline w-100">
                                                <input type="text" name="GST_NO" class="form-control form-control-lg"
                                                        value="{{ client.GST_no }}" id="birthdayDate" />
                                                <label for="birthdayDate" class="form-label">GST NO</label>
                                        </div>

                                </div>
                        </div>

                        <div class="row">
                                <div class="col-md-6 mb-4 d-flex align-items-center">

                                        <div class="form-outline w-100">
                                                <input type="tel" name="company_name"
                                                        class="form-control form-control-lg"
                                                        value="{{ client.company_name }}" id="birthdayDate" />
                                                <label for="birthdayDate" class="form-label">Company Name</label>
                                        </div>

                                </div>


                                <div class="col-md-6 mb-4">
                                        <div class="form-outline w-100">
                                                <div class="form-check form-switch">
                                                        <input class="form-check-input" type="checkbox" name="amc" {% if
                                                                client.amc_client %}checked{% endif %} role="switch"
                                                                id="flexSwitchCheckChecked" />
                                                        <label class="form-check-label" for="flexSwitchCheckChecked">AMC
                                                                Client</label>
                                                </div>
                                        </div>
                                </div>
                        </div>


                        <ul class="nav nav-pills mb-3 justify-content-center" id="pills-tab2" role="tablist">
                                <li class="nav-item" role="presentation">
                                        <button class="btn btn-primary" type="submit" id="pills-home-tab2"
                                                data-mdb-toggle="pill" data-mdb-target="#pills-home2" type="button"
                                                role="tab" aria-controls="pills-home" aria-selected="true"><i
                                                        class="fas fa-edit"></i>
                                                Update
                                        </button>
                                </li>
                        </ul>
                </form>
        </div>
</section>




{% endblock %}
